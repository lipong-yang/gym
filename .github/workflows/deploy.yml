name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check required secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          [ -z "$VITE_SUPABASE_URL" ] && { echo "::error::Missing secret VITE_SUPABASE_URL"; missing=1; }
          [ -z "$VITE_SUPABASE_ANON_KEY" ] && { echo "::error::Missing secret VITE_SUPABASE_ANON_KEY"; missing=1; }
          if [ "$missing" = 1 ]; then
            echo "::error::Add them in Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi
      - name: Build
        env:
          # Set these in: repo Settings -> Secrets and variables -> Actions.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Served at https://<user>.github.io/<repo>/ — must match the repo name.
          VITE_BASE: /gym/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
